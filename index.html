<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Narayana AI</title>
    <style>
        :root {
            --bg-color: #0b0704; 
            --panel-bg: #140d08;
            --primary-color: #e65100; 
            --accent-color: #d4af37; 
            --text-main: #f5f5f5;
            --text-muted: #a1887f;
            --user-msg-bg: #23160e;
            --ai-msg-bg: #1a100a;
            --border-color: #2c1a0e;
            --glow-color: rgba(212, 175, 55, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { background-color: var(--panel-bg); border-bottom: 1px solid var(--border-color); padding: 20px; text-align: center; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6); z-index: 10; }
        header h1 { font-size: 1.8rem; color: var(--accent-color); letter-spacing: 3px; font-weight: 700; text-shadow: 0 0 10px rgba(212, 175, 55, 0.3); }
        header p { font-size: 0.85rem; color: var(--text-muted); margin-top: 6px; letter-spacing: 1.5px; text-transform: uppercase; }

        .chat-container { flex: 1; overflow-y: auto; padding: 30px 20px; display: flex; flex-direction: column; gap: 25px; max-width: 900px; width: 100%; margin: 0 auto; scroll-behavior: smooth; }
        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }

        .message { max-width: 85%; padding: 22px; border-radius: 8px; line-height: 1.8; font-size: 1.05rem; box-shadow: 0 10px 25px rgba(0,0,0,0.4); animation: slideUpIn 0.4s ease forwards; border: 1px solid var(--border-color); }
        @keyframes slideUpIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .user-message { background-color: var(--user-msg-bg); border-color: #3e2414; align-self: flex-end; color: #ffe0b2; border-bottom-right-radius: 0px; }
        .ai-message { background-color: var(--ai-msg-bg); border-left: 4px solid var(--primary-color); align-self: flex-start; border-bottom-left-radius: 0px; }
        .ai-message strong { color: var(--accent-color); display: inline-block; margin-top: 12px; margin-bottom: 4px; }
        .ai-message strong:first-of-type { margin-top: 0; }

        .input-wrapper { background-color: var(--panel-bg); border-top: 1px solid var(--border-color); padding: 25px 20px; }
        .input-container { background-color: var(--bg-color); padding: 8px 8px 8px 24px; display: flex; gap: 15px; max-width: 900px; width: 100%; margin: 0 auto; border-radius: 30px; border: 1px solid var(--border-color); align-items: center; }
        input[type="text"] { flex: 1; border: none; outline: none; padding: 10px 0; font-size: 1.05rem; background: transparent; color: var(--text-main); }
        input[type="text"]::placeholder { color: #5a4537; }

        .send-btn { background: linear-gradient(135deg, #e65100, #b71c1c); color: white; border: none; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .send-btn svg { width: 18px; height: 18px; fill: white; transform: translateX(1px); }

        .typing-indicator { display: flex; gap: 6px; padding: 8px 4px; align-items: center; }
        .typing-indicator span { width: 8px; height: 8px; background-color: var(--accent-color); border-radius: 50%; animation: dotBounce 1.4s infinite ease-in-out both; }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes dotBounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1.0); } }
    </style>
</head>
<body>

    <header>
        <h1>नारायण AI</h1>
        <p>आत्म-साक्षात्कार परीक्षा: आत्म-मंथन हेतु जटिल दार्शनिक प्रश्नोत्तरी</p>
    </header>

    <div class="chat-container" id="chatContainer">
        <div class="message ai-message">
            प्रणाम। मैं <strong>नारायण AI</strong> हूँ। यहाँ आपको रेडीमेड उत्तर या सांत्वना नहीं मिलेगी। यहाँ आपके विचारों, आपके अहंकार और आपकी समझ की परीक्षा होगी। अपना विचार या संशय प्रस्तुत करें।
        </div>
    </div>

    <div class="input-wrapper">
        <div class="input-container">
            <input type="text" id="userInput" placeholder="अपनी स्थिति या दार्शनिक संशय यहाँ अंकित करें..." onkeypress="handleKeyPress(event)">
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
            </button>
        </div>
    </div>

    <script>
        let conversationHistory = [];
        // Points to your secure backend function instead of Google directly
        const API_URL = "/api/chat"; 

        async function sendMessage() {
            const inputField = document.getElementById('userInput');
            const sendBtn = document.getElementById('sendBtn');
            const query = inputField.value.trim();
            
            if (query === "" || sendBtn.disabled) return;

            appendMessage(query, 'user-message');
            inputField.value = "";
            
            inputField.disabled = true;
            sendBtn.disabled = true;
            const loaderId = appendLoadingIndicator();

            conversationHistory.push({
                role: "user",
                parts: [{ text: query }]
            });

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ history: conversationHistory })
                });

                const data = await response.json();
                removeLoadingIndicator(loaderId);

                if (data && data.reply) {
                    let aiReply = data.reply;
                    
                    conversationHistory.push({
                        role: "model",
                        parts: [{ text: aiReply }]
                    });

                    aiReply = aiReply.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                    aiReply = aiReply.replace(/\n/g, '<br>');

                    appendMessage(aiReply, 'ai-message');
                } else {
                    appendMessage("त्रुटि। मंथन केंद्र व्यस्त है। पुनः प्रयास करें।", 'ai-message');
                }
            } catch (error) {
                removeLoadingIndicator(loaderId);
                appendMessage("सम्पर्क बाधित। पुनः प्रयास करें।", 'ai-message');
            }

            inputField.disabled = false;
            sendBtn.disabled = false;
            inputField.focus();
        }

        function appendMessage(text, className) {
            const chatContainer = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${className}`;
            messageDiv.innerHTML = text;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function appendLoadingIndicator() {
            const chatContainer = document.getElementById('chatContainer');
            const loaderDiv = document.createElement('div');
            const id = "loader_" + Date.now();
            loaderDiv.id = id;
            loaderDiv.className = "message ai-message";
            loaderDiv.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`;
            chatContainer.appendChild(loaderDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return id;
        }

        function removeLoadingIndicator(id) {
            const loader = document.getElementById(id);
            if (loader) loader.remove();
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') sendMessage();
        }
    </script>
</body>
</html>
