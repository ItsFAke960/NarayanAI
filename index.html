<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Narayana AI - Entrance</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at center, #110a04 0%, #050301 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Georgia', serif;
        }

        .cosmic-ring {
            position: absolute;
            width: 350px;
            height: 350px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 50%;
            animation: spin 20s linear infinite;
            z-index: 1;
        }

        .cosmic-ring::before {
            content: '';
            position: absolute;
            top: -5px;
            left: 50%;
            width: 10px;
            height: 10px;
            background: #ff6f00;
            border-radius: 50%;
            box-shadow: 0 0 15px #ff6f00;
        }

        .intro-container {
            text-align: center;
            z-index: 2;
        }

        .divine-btn {
            background: transparent;
            color: #d4af37;
            border: 2px solid #d4af37;
            padding: 16px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.4s ease;
        }

        .divine-btn:hover {
            background: #d4af37;
            color: #110a04;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.4);
        }

        .title-reveal {
            display: none;
            font-size: 4rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255, 111, 0, 0.7);
            letter-spacing: 6px;
        }

        .animate-text {
            animation: grandReveal 3.5s forwards cubic-bezier(0.15, 0.85, 0.35, 1);
        }

        .fade-out-page {
            animation: fadePage 1.5s forwards ease-in-out;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        @keyframes grandReveal {
            0% { opacity: 0; transform: scale(0.9); filter: blur(8px); }
            40% { opacity: 1; transform: scale(1.02); filter: blur(0); }
            100% { opacity: 1; transform: scale(1); filter: blur(0); }
        }

        @keyframes fadePage {
            to { opacity: 0; filter: blur(10px); }
        }

        .subtext {
            color: #d4af37;
            font-size: 1rem;
            margin-top: 20px;
            letter-spacing: 8px;
            opacity: 0;
            text-transform: uppercase;
        }
        
        .animate-subtext {
            animation: fadeInSub 2s 1.2s forwards ease-out;
        }

        @keyframes fadeInSub {
            to { opacity: 0.6; }
        }
    </style>
</head>
<body>

    <div class="cosmic-ring"></div>

    <div class="intro-container">
        <button id="startBtn" class="divine-btn" onclick="awakenDivineSpace()">Enter Divine Space</button>
        <h1 id="mainTitle" class="title-reveal">नारायण AI</h1>
        <p id="subTitle" class="subtext">Narayana AI</p>
    </div>

    <script>
        function awakenDivineSpace() {
            document.getElementById('startBtn').style.display = 'none';

            // High-fidelity standard synthesized multi-tone cosmic vibration for OM
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // Core frequency nodes
            const frequencies = [136.1, 272.2, 68.05]; 
            frequencies.forEach((freq, ai) => {
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                osc.type = index === 1 ? 'sine' : 'triangle';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                
                // Modulate amplitude slightly over time to simulate a natural voice wave
                gainNode.gain.setValueAtTime(0.0, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.5);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 4.0);
                
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 4.2);
            });

            const title = document.getElementById('mainTitle');
            const sub = document.getElementById('subTitle');
            
            title.style.display = 'block';
            title.classList.add('animate-text');
            sub.classList.add('animate-subtext');

            setTimeout(() => {
                document.body.classList.add('fade-out-page');
            }, 3800);

            setTimeout(() => {
                window.location.href = 'index.html';
            }, 5200);
        }
    </script>
</body>
</html>
